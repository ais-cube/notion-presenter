<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #191919;
      color: #E0E0E0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      cursor: pointer;
    }
    label:hover { color: #fff; }
    input[type="radio"],
    input[type="checkbox"] {
      accent-color: #5B9BD5;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #5B9BD5;
      color: #fff;
    }
    .btn-primary:hover { background: #4A8BC4; }
    .btn-primary:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .status.error { color: #E57373; }
    .status.success { color: #81C784; }
    .shortcuts {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .shortcut-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      color: #888;
    }
    .shortcut-row kbd {
      background: #2A2A2A;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
      color: #CCC;
    }
    .theme-select {
      width: 100%;
      padding: 6px 8px;
      background: #2A2A2A;
      border: 1px solid #444;
      border-radius: 4px;
      color: #E0E0E0;
      font-size: 13px;
      cursor: pointer;
    }
    .theme-select:focus { outline: 1px solid #5B9BD5; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Notion Presenter">
    <h1>Notion Presenter</h1>
  </div>

  <div class="section">
    <div class="section-title">Split slides by</div>
    <label><input type="radio" name="splitMode" value="divider" checked> Horizontal dividers</label>
    <label><input type="radio" name="splitMode" value="h1"> H1 headings</label>
    <label><input type="radio" name="splitMode" value="h2"> H2 headings</label>
    <label><input type="radio" name="splitMode" value="h1h2"> H1 + H2 headings</label>
  </div>

  <div class="section">
    <div class="section-title">Theme</div>
    <select class="theme-select" id="themeSelect">
      <option value="light" selected>Light</option>
      <option value="dark">Dark</option>
      <option value="notion">Notion Classic</option>
      <option value="gradient">Gradient Dark</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Options</div>
    <label><input type="checkbox" id="showToc"> Show table of contents sidebar</label>
  </div>

  <button class="btn btn-primary" id="startBtn">Start Presentation</button>
  <div class="status" id="status"></div>

  <div class="shortcuts">
    <div class="section-title">Keyboard shortcuts</div>
    <div class="shortcut-row"><span>Next slide</span><kbd>→</kbd> <kbd>Space</kbd></div>
    <div class="shortcut-row"><span>Previous slide</span><kbd>←</kbd></div>
    <div class="shortcut-row"><span>First / Last</span><kbd>Home</kbd> / <kbd>End</kbd></div>
    <div class="shortcut-row"><span>Exit</span><kbd>Esc</kbd></div>
    <div class="shortcut-row"><span>Fullscreen</span><kbd>F</kbd></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
