name: Deploy Privacy Policy to GitHub Pages

on:
  push:
    branches: [master]
    paths: [privacy-policy.html]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare pages directory
        run: |
          mkdir _site
          cp privacy-policy.html _site/index.html
          cp privacy-policy.html _site/privacy-policy.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
